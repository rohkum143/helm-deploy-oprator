# Test case for basic Helm chart deployment
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "nginx-helm-operator.fullname" . }}-test-deployment
  namespace: {{ include "nginx-helm-operator.namespaceName" . }}
  labels:
    {{- include "nginx-helm-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: test-deployment
    image: busybox:1.35
    command:
    - /bin/sh
    - -c
    - |
      set -e
      echo "Testing nginx-helm-operator deployment..."
      
      # Test 1: Check if the operator deployment exists
      echo "Test 1: Checking operator deployment..."
      kubectl get deployment {{ include "nginx-helm-operator.fullname" . }}-controller-manager -n {{ include "nginx-helm-operator.namespaceName" . }}
      
      # Test 2: Check if the operator pod is running
      echo "Test 2: Checking operator pod status..."
      kubectl wait --for=condition=Ready pod -l control-plane=controller-manager -n {{ include "nginx-helm-operator.namespaceName" . }} --timeout=300s
      
      # Test 3: Check if CRD is installed
      echo "Test 3: Checking CRD installation..."
      kubectl get crd nginxdeployments.deploy.example.com
      
      # Test 4: Check if RBAC is properly configured
      echo "Test 4: Checking RBAC configuration..."
      kubectl get clusterrole {{ include "nginx-helm-operator.fullname" . }}-manager-role
      kubectl get clusterrolebinding {{ include "nginx-helm-operator.fullname" . }}-manager-rolebinding
      kubectl get serviceaccount {{ include "nginx-helm-operator.serviceAccountName" . }} -n {{ include "nginx-helm-operator.namespaceName" . }}
      
      echo "All deployment tests passed!"