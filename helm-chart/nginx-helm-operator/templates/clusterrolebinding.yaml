{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nginx-helm-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "nginx-helm-operator.labels" . | nindent 4 }}
  annotations:
    {{- include "nginx-helm-operator.annotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nginx-helm-operator.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "nginx-helm-operator.serviceAccountName" . }}
  namespace: {{ include "nginx-helm-operator.namespaceName" . }}
{{- end }}