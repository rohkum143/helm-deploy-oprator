{{- if and .Values.rbac.create .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "nginx-helm-operator.fullname" . }}-leader-election-rolebinding
  namespace: {{ include "nginx-helm-operator.namespaceName" . }}
  labels:
    {{- include "nginx-helm-operator.labels" . | nindent 4 }}
  annotations:
    {{- include "nginx-helm-operator.annotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "nginx-helm-operator.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "nginx-helm-operator.serviceAccountName" . }}
  namespace: {{ include "nginx-helm-operator.namespaceName" . }}
{{- end }}